                chartDiv.on('plotly_click', function(data) {
                    if (!document.getElementById('clickPriceMode').checked) return;
                    if (!data || !data.points || !data.points[0]) return;
                    const pt = data.points[0];
                    const clickedPrice = pt.y;
                    const clickedDate = new Date(pt.x);
                    if (!usdRawData) return;
                    const dates = usdRawData.chart.dates;
                    const prices = usdRawData.chart.prices;
                    const f4 = n => n.toFixed(4);
                    const f2 = n => n.toFixed(2);
                    const dd = String(clickedDate.getDate()).padStart(2,'0');
                    const mm = String(clickedDate.getMonth()+1).padStart(2,'0');
                    const yyyy = clickedDate.getFullYear();
                    const dateStr = `${dd}.${mm}.${yyyy}`;
                    const tr = timeRangeMap[activeTimeRange];
                    let targetIndex = 0;
                    if (tr) {
                        const endDate = new Date(dates[dates.length - 1]);
                        let targetDate = new Date(endDate);
                        if (tr.unit === 'months') targetDate.setMonth(endDate.getMonth() - tr.value);
                        else if (tr.unit === 'days') targetDate.setDate(endDate.getDate() - tr.value);
                        else targetDate.setFullYear(endDate.getFullYear() - tr.value);
                        const targetTime = targetDate.getTime();
                        for (let i = 0; i < dates.length; i++) {
                            if (targetTime - new Date(dates[i]).getTime() <= 0) { targetIndex = i; break; }
                        }
                    }
                    const visiblePrices = prices.slice(targetIndex);
                    let vmax = -Infinity, vmin = Infinity;
                    for (const p of visiblePrices) { if (p > vmax) vmax = p; if (p < vmin) vmin = p; }
                    const startPrice = visiblePrices[0];
                    const diff_peak   = ((clickedPrice - vmax) / vmax) * 100;
                    const diff_bottom = ((clickedPrice - vmin) / vmin) * 100;
                    const periodReturn = ((clickedPrice - startPrice) / startPrice) * 100;
                    const periodColor  = periodReturn >= 0 ? '#10B981' : '#EF4444';
                    const periodPrefix = periodReturn >= 0 ? '+' : '';
                    const clickedTitleHTML = `
<span style="font-size:11px; color:#10B981;">Dip: +%${f2(diff_bottom)}</span> | 
<span style="font-size:14px; font-weight:bold; color:#10B981;">${currentSymbol}: $${f4(clickedPrice)} <span style="font-size:10px;color:#f59e0b;">(${dateStr})</span></span> | 
<span style="font-size:11px; color:#EF4444;">Zirve: %${f2(diff_peak)}</span>
<br><span style="font-size:12px; color:${periodColor};">\u{1F4C5} ${activeTimeRange} Getiri: ${periodPrefix}%${f2(periodReturn)}</span>`;
                    Plotly.relayout('chart', { title: { text: clickedTitleHTML, x: 0.5, y: 0.95, font: {size: 14} } });
                });
            });
        }

        function applyUsdTimeRange(rangeKey, dates) {
            if (!dates || dates.length === 0) return;
            const tr = timeRangeMap[rangeKey];
            if (!tr) return;
            const prices = usdRawData.chart.prices;
            const lastPrice = usdRawData.chart.last_price;

            let targetIndex = 0;
            let minDate = dates[0];
            {
                const endDate = new Date(dates[dates.length - 1]);
                let targetDate = new Date(endDate);
                if (tr.unit === 'months') targetDate.setMonth(endDate.getMonth() - tr.value);
                else if (tr.unit === 'days') targetDate.setDate(endDate.getDate() - tr.value);
                else targetDate.setFullYear(endDate.getFullYear() - tr.value);
                const targetTime = targetDate.getTime();
                for (let i = 0; i < dates.length; i++) {
                    if (targetTime - new Date(dates[i]).getTime() <= 0) { targetIndex = i; break; }
                }
                minDate = dates[targetIndex];
            }

            const visiblePrices = prices.slice(targetIndex);
            let new_val_max = -Infinity, new_idx_max_date = '';
            let new_val_min = Infinity,  new_idx_min_date = '';
            for (let i = 0; i < visiblePrices.length; i++) {
                const p = visiblePrices[i];
                const d = dates[targetIndex + i];
                if (p > new_val_max) { new_val_max = p; new_idx_max_date = d; }
                if (p < new_val_min) { new_val_min = p; new_idx_min_date = d; }
            }

            const padding    = (new_val_max - new_val_min) * 0.05;
            const diff_peak  = ((lastPrice - new_val_max) / new_val_max) * 100;
            const diff_bottom = ((lastPrice - new_val_min) / new_val_min) * 100;
            const startPrice  = visiblePrices[0];
            const periodReturn = ((lastPrice - startPrice) / startPrice) * 100;
            const periodColor  = periodReturn >= 0 ? '#10B981' : '#EF4444';
            const periodPrefix = periodReturn >= 0 ? '+' : '';
            const f4 = n => n.toFixed(4);
            const f2 = n => n.toFixed(2);

            const startDateFmt = new Date(dates[targetIndex]).toLocaleDateString('tr-TR', {day:'2-digit', month:'2-digit', year:'numeric'});
            const startDateObj  = new Date(dates[targetIndex]);
            const today = new Date();
            let yil = today.getFullYear() - startDateObj.getFullYear();
            let ay  = today.getMonth() - startDateObj.getMonth();
            let gun = today.getDate()  - startDateObj.getDate();
            if (gun < 0) { ay--; gun += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
            if (ay  < 0) { yil--; ay += 12; }
            const gecenSure = [yil>0?yil+'y':'', ay>0?ay+'a':'', gun>0?gun+'g':''].filter(Boolean).join(' ') || '0g';

            document.getElementById('cariTitleText').innerHTML =
                `Cari Değerler <span style="color:#10B981; font-size:10px; font-weight:normal;">$ mod · ${startDateFmt} — $${f4(startPrice)} — ${gecenSure}</span>`;

            const titleHTML = `
<span style="font-size:11px; color:#10B981;">Dip: +%${f2(diff_bottom)}</span> | 
<span style="font-size:14px; font-weight:bold; color:#10B981;">${currentSymbol}: $${f4(lastPrice)}</span> | 
<span style="font-size:11px; color:#EF4444;">Zirve: %${f2(diff_peak)}</span>
<br><span style="font-size:12px; color:${periodColor};">📅 ${rangeKey} Getiri: ${periodPrefix}%${f2(periodReturn)}</span>`;

            Plotly.relayout('chart', {
                'xaxis.range': [minDate, dates[dates.length - 1]],
                'yaxis.range': [new_val_min - padding, new_val_max + padding],
                title: { text: titleHTML, x: 0.5, y: 0.95, font: {size: 14} },
                annotations: [
                    {
                        x: new_idx_max_date, y: new_val_max,
                        text: `<br><b>$${f4(new_val_max)}</b>`,
                        showarrow: true, arrowhead: 2, arrowcolor: '#10B981',
                        ax: -10, ay: 0, xanchor: 'right',
                        font: {color: '#10B981', size: 10}
                    },
                    {
                        x: new_idx_min_date, y: new_val_min,
                        text: `<br><b>$${f4(new_val_min)}</b>`,
                        showarrow: true, arrowhead: 2, arrowcolor: '#EF4444',
                        ax: -10, ay: 0, xanchor: 'right',
                        font: {color: '#EF4444', size: 10}
                    }
                ]
            });
        }

        // --- VERİ ÇEKME VE ÇİZİM ---
        function loadRandomSymbol() {
            const randomSymbol = activeList[Math.floor(Math.random() * activeList.length)];
            currentSymbol = randomSymbol;
            document.getElementById('symbol').value = currentSymbol;
            loadData();
            updateSymbolIndex();
        }       
        
        // Altın verisini arka planda çek / güncelle
        let _goldFetching = false;
        async function fetchGoldData(years) {
            const needed = years || 10;
            if (goldData && (goldData.loadedYears || 0) >= needed) return;
            if (_goldFetching) return;
            _goldFetching = true;
            try {
                const r = await fetch(apiUrl(`/gold?years=${needed}`));
                const d = await r.json();
                if (!d.error && d.dates && d.dates.length) {
                    goldData = { dates: d.dates, prices: d.prices, loadedYears: needed };
                }
            } catch(e) { /* sessizce geç */ }
            finally { _goldFetching = false; }
        }

        let _usdFetching = false;
        async function fetchUsdData(years) {
            const needed = years || 10;
            if (usdData && (usdData.loadedYears || 0) >= needed) return;
            if (_usdFetching) return;
            _usdFetching = true;
            try {
                const r = await fetch(apiUrl(`/usdtry?years=${needed}`));
                const d = await r.json();
                if (!d.error && d.dates && d.dates.length) {
                    usdData = { dates: d.dates, prices: d.prices, loadedYears: needed };
                }
            } catch(e) { /* sessizce geç */ }
            finally { _usdFetching = false; }
        }

        async function loadData(years) {
            document.getElementById('loader').style.display = 'block';
            tvRawData = null;
            isUsdMode = false;
            usdRawData = null;
            const usdBtn = document.getElementById('usdModeBtn');
            if (usdBtn) usdBtn.classList.remove('usd-active');
            
            const lDiv = document.getElementById('links');
            lDiv.innerHTML = externalLinks.map(l => {
                if (l.url === '__AI__') {
                    return `<a href="#" onclick="openAIModal(event)" style="color:#a78bfa; border-color:#a78bfa;">${l.name}</a>`;
                }
                if (l.url === '__NEWS__') {
                    return `<a href="#" onclick="openNewsModal(event)" style="color:#34d399; border-color:#34d399;">${l.name}</a>`;
                }
                return `<a href="${l.url.replace(/__SYM__/g, currentSymbol)}" target="_blank">${l.name}</a>`;
            }).join('');

            try {
                const _years = years || 10;
                const [analyzeSettled, tvSettled] = await Promise.allSettled([
                    fetch(apiUrl(`/analyze?s=${currentSymbol}&years=${_years}`)),
                    fetch(apiUrl(`/tvdata?s=${currentSymbol}`))
                ]);

                // /analyze başarısız olduysa devam edemeyiz (grafik verisi yok)
                if (analyzeSettled.status === 'rejected' || !analyzeSettled.value.ok) {
                    alert("Ana veri çekilemedi. Lütfen tekrar deneyin.");
                    return;
                }
                rawData = await analyzeSettled.value.json();
                rawData._loadedYears = _years;
                if (rawData.error) { alert(rawData.error); return; }

                // /tvdata isteğe bağlı — başarısız olursa sessizce atla
                tvRawData = null;
                if (tvSettled.status === 'fulfilled' && tvSettled.value.ok) {
                    try { tvRawData = await tvSettled.value.json(); } catch(_) { tvRawData = null; }
                    if (tvRawData && tvRawData.error) tvRawData = null;
                }

                let cariItems = [...rawData.cari];

                if (tvRawData && !tvRawData.error) {
                    if (tvRawData['Son Fiyat'] !== null && tvRawData['Son Fiyat'] !== undefined) {
                        rawData.chart.last_price = tvRawData['Son Fiyat'];
                    }
                    if (tvRawData['Değişim %'] !== null && tvRawData['Değişim %'] !== undefined) {
                        updateChangeFromTV(tvRawData['Değişim %']);
                    }

                    function fmtTVVal(key, val) {
                        if (val === null || val === undefined) return '--';
                        if (key === 'Net Kar') {
                            const abs = Math.abs(val);
                            const sign = val < 0 ? '-' : '';
                            if (abs >= 1e9) return sign + (abs/1e9).toFixed(2) + ' Mr';
                            if (abs >= 1e6) return sign + (abs/1e6).toFixed(2) + ' Mn';
                            return val.toFixed(2);
                        }
                        if (key === 'Temettü Verimi %' || key === 'Faaliyet Kar Marjı %' || key === 'Özkaynak Karlılığı %') return val.toFixed(2) + '%';
                        return typeof val === 'number' ? val.toFixed(2) : val;
                    }

                    const netBorcIdx = cariItems.findIndex(i => i.key.includes('Net Borç') || i.key.includes('Net Borc'));
                    const netKarItem = { key: 'Net Kar', value: fmtTVVal('Net Kar', tvRawData['Net Kar']) };
                    if (netBorcIdx !== -1) {
                        cariItems.splice(netBorcIdx + 1, 0, netKarItem);
                    } else {
                        cariItems.push(netKarItem);
                    }

                    const tvTail = [
                        { key: 'Temettü Verimi %',    val: tvRawData['Temettü Verimi %'] },
                        { key: 'Cari Oran',            val: tvRawData['Cari Oran'] },
                        { key: 'Beta (1Y)',            val: tvRawData['Beta (1Y)'] },
                        { key: 'Faaliyet Kar Marjı %', val: tvRawData['Faaliyet Kar Marjı %'] },
                        { key: 'Özkaynak Karlılığı %', val: tvRawData['Özkaynak Karlılığı %'] }
                    ];
                    tvTail.forEach(item => {
                        cariItems.push({ key: item.key, value: fmtTVVal(item.key, item.val), rawVal: item.val });
                    });
                }

                function getCariColor(key, value) {
                    const v = parseFloat(String(value).replace(',', '.').replace(/[^0-9.\-]/g, ''));
                    if (isNaN(v)) return '';
                    if (key === 'F/K') return (v >= 0 && v <= 20) ? 'val-pos' : 'val-neg';
                    if (key === 'PD/DD') return v < 2 ? 'val-pos' : 'val-neg';
                    if (key.includes('Yabancı')) return v > 1 ? 'val-pos' : 'val-neg';
                    if (key.includes('Halka Açıklık')) return v < 50 ? 'val-pos' : 'val-neg';
                    if (key === 'Cari Oran') return v > 1 ? 'val-pos' : 'val-neg';
                    if (key.includes('Net Borç')) return v < 0 ? 'val-pos' : 'val-neg';
                    if (key === 'Net Kar') {
                        const isNeg = String(value).trim().startsWith('-');
                        return isNeg ? 'val-neg' : 'val-pos';
                    }
                    if (key === 'H.A. Borsa Değeri') return String(value).includes('Mn TL') ? 'val-pos' : '';
                    if (key === 'Temettü Verimi %') return v > 1 ? 'val-pos' : '';
                    if (key === 'Beta (1Y)') return v < 1 ? 'val-pos' : 'val-neg';
                    if (key === 'Faaliyet Kar Marjı %') return v >= 0 ? 'val-pos' : 'val-neg';
                    if (key === 'Özkaynak Karlılığı %') return v >= 0 ? 'val-pos' : 'val-neg';
                    return '';
                }

                document.getElementById('cari').innerHTML = cariItems.map(i => {
                    const colorClass = getCariColor(i.key, i.value);
                    return `<div class="info-item"><span>${i.key}</span><span class="${colorClass}">${i.value}</span></div>`;
                }).join('');

                document.getElementById('descTitle').innerText = (rawData.company_name || currentSymbol) + " | " + currentSymbol;
                document.getElementById('desc').innerText = rawData.desc;

                drawChartBase();
                updateStarUI();
                updateSymbolIndex();
                // Önce grafik göster, sonra altın/dolar gelince başlığı güncelle
                const _gYears = years || 10;
                changeTimeRange(activeTimeRange, false);
                const _refreshTitle = () => { if (activeTimeRange) changeTimeRange(activeTimeRange, false); };
                if (!goldData || (goldData.loadedYears || 0) < _gYears) {
                    fetchGoldData(_gYears).then(_refreshTitle);
                }
                if (!usdData || (usdData.loadedYears || 0) < _gYears) {
                    fetchUsdData(_gYears).then(_refreshTitle);
                }
            } catch(e) {
                console.error(e);
                alert("Veri çekilirken hata oluştu.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function updateChangeFromTV(change) {
            const items = document.querySelectorAll('#cari .info-item');
            items.forEach(item => {
                const keySpan = item.querySelector('span:first-child');
                const valSpan = item.querySelector('span:last-child');
                if (keySpan && valSpan && keySpan.textContent.trim() === 'Değişim') {
                    const color = change > 0 ? 'val-pos' : (change < 0 ? 'val-neg' : '');
                    const prefix = change > 0 ? '+' : '';
                    valSpan.innerHTML = `<span class="${color}">${prefix}%${change.toFixed(2)}</span>`;
                }
            });
        }

        function drawChartBase() {
            const chartDiv = document.getElementById('chart');
            const dates = rawData.chart.dates;
            const prices = rawData.chart.prices;
            const ma50 = rawData.chart.ma50;
            const ma200 = rawData.chart.ma200;

            const customDates = dates.map(d => { const dt = new Date(d); const dd = String(dt.getDate()).padStart(2,'0'); const mm = String(dt.getMonth()+1).padStart(2,'0'); const yyyy = dt.getFullYear(); return `${dd}.${mm}.${yyyy}`; });
            const traceP = { x: dates, y: prices, customdata: customDates, type: 'scatter', mode: 'lines', name: 'Fiyat', line: {color: '#5D5CDE', width: 1.2}, hovertemplate: '<b>%{y:.2f} ₺</b><br>%{customdata}<extra></extra>' };
            const trace50 = { x: dates, y: ma50, type: 'scatter', mode: 'lines', name: 'MA50', line: {color: '#f97316', width: 1.0, dash: 'dot'}, hoverinfo:'skip' };
            const trace200 = { x: dates, y: ma200, type: 'scatter', mode: 'lines', name: 'MA200', line: {color: '#3B82F6', width: 1.0, dash: 'dot'}, hoverinfo:'skip' };

            const layout = {
                paper_bgcolor: '#000', plot_bgcolor: '#000',
                margin: { l: 40, r: 10, t: 30, b: 20 },
                xaxis: { type: 'date', gridcolor: '#222', tickfont: {color: '#888', size: 10}, fixedrange: false, showspikes: true, spikemode: 'across', spikecolor: '#888', spikethickness: 1, spikedash: 'dot' },
                yaxis: { gridcolor: '#222', side: 'left', tickfont: {color: '#888', size: 10}, fixedrange: false },
                showlegend: false, hovermode: 'closest', dragmode: 'pan',
                newshape: { fillcolor: 'rgba(128, 128, 128, 0.4)', opacity: 0.5 },
                hoverlabel: { bgcolor: '#1a1a2e', bordercolor: '#5D5CDE', font: { color: '#ffffff', size: 13 }, align: 'left' }
            };

            document.querySelectorAll('.shape-close-btn').forEach(b => b.remove());

            Plotly.newPlot(chartDiv, [traceP, trace50, trace200], layout, {responsive: true, displayModeBar: false, scrollZoom: false}).then(() => {

                function getPlotBounds() {
                    const rect = chartDiv.getBoundingClientRect();
                    const ml = chartDiv.layout.margin.l || 40;
                    const mr = chartDiv.layout.margin.r || 10;
                    const mt = chartDiv.layout.margin.t || 30;
                    const mb = chartDiv.layout.margin.b || 20;
                    return {
                        left: rect.left + ml, right: rect.right - mr,
                        top: rect.top + mt,   bottom: rect.bottom - mb,
                        plotW: rect.width - ml - mr,
                        plotH: rect.height - mt - mb,
                        rect
                    };
                }

                function applyZoom(zoomX, zoomY, clientMidX, clientMidY, scale) {
                    const b = getPlotBounds();
                    const l = chartDiv.layout;
                    const xRange = l.xaxis.range;
                    const yRange = l.yaxis.range;
                    if (!xRange || !yRange) return;
                    const update = {};

                    if (zoomX) {
                        const x0ms = new Date(xRange[0]).getTime();
                        const x1ms = new Date(xRange[1]).getTime();
                        const xSpan = x1ms - x0ms;
                        const ratioX = Math.max(0, Math.min(1, (clientMidX - b.left) / b.plotW));
                        const xFocus = x0ms + ratioX * xSpan;
                        update['xaxis.range'] = [
                            new Date(xFocus - ratioX * xSpan * scale).toISOString(),
                            new Date(xFocus + (1 - ratioX) * xSpan * scale).toISOString()
                        ];
                    }
                    if (zoomY) {
                        const y0 = parseFloat(yRange[0]), y1 = parseFloat(yRange[1]);
                        const ySpan = y1 - y0;
                        const ratioY = Math.max(0, Math.min(1, 1 - (clientMidY - b.top) / b.plotH));
                        const yFocus = y0 + ratioY * ySpan;
                        update['yaxis.range'] = [
                            yFocus - ratioY * ySpan * scale,
                            yFocus + (1 - ratioY) * ySpan * scale
                        ];
                    }
                    if (Object.keys(update).length) Plotly.relayout(chartDiv, update);
                }

                chartDiv.addEventListener('wheel', function(e) {
                    e.preventDefault();
                    const b = getPlotBounds();
                    const cx = e.clientX, cy = e.clientY;
                    const scale = e.deltaY > 0 ? 1.12 : 0.89;
                    const onYAxis = cx < b.left;
                    const onXAxis = cy > b.bottom;
                    applyZoom(!onYAxis, !onXAxis, cx, cy, scale);
                }, { passive: false });

                let touchState = null;

                chartDiv.addEventListener('touchstart', function(e) {
                    const b = getPlotBounds();
                    const t0 = e.touches[0];

                    if (e.touches.length === 1) {
                        const cx = t0.clientX, cy = t0.clientY;
                        const onYAxis = cx < b.left;
                        const onXAxis = cy > b.bottom;

                        if (onYAxis) {
                            e.preventDefault();
                            touchState = { mode: 'zoomY', startY: cy, startRange: [...chartDiv.layout.yaxis.range] };
                        } else if (onXAxis) {
                            e.preventDefault();
                            touchState = { mode: 'zoomX', startX: cx, startRange: [...chartDiv.layout.xaxis.range] };
                        } else {
                            touchState = null;
                        }
                    } else if (e.touches.length === 2) {
                        e.preventDefault();
                        const t1 = e.touches[1];
                        const dist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
                        const midX = (t0.clientX + t1.clientX) / 2;
                        const midY = (t0.clientY + t1.clientY) / 2;
                        const onYAxis = midX < b.left;
                        const onXAxis = midY > b.bottom;
                        touchState = {
                            mode: onYAxis ? 'zoomY' : onXAxis ? 'zoomX' : 'zoomXY',
                            startDist: dist, midX, midY
                        };
                    }
                }, { passive: false });

                chartDiv.addEventListener('touchmove', function(e) {
                    if (!touchState) return;
                    e.preventDefault();
                    const b = getPlotBounds();

                    if (e.touches.length === 1 && touchState.mode === 'zoomY') {
                        const dy = touchState.startY - e.touches[0].clientY;
                        const scale = Math.pow(0.99, dy);
                        const l = chartDiv.layout;
                        const sr = touchState.startRange;
                        const ySpan = parseFloat(sr[1]) - parseFloat(sr[0]);
                        const midY = (parseFloat(sr[0]) + parseFloat(sr[1])) / 2;
                        Plotly.relayout(chartDiv, {
                            'yaxis.range': [midY - ySpan * scale / 2, midY + ySpan * scale / 2]
                        });
                    } else if (e.touches.length === 1 && touchState.mode === 'zoomX') {
                        const dx = e.touches[0].clientX - touchState.startX;
                        const scale = Math.pow(1.01, dx);
                        const sr = touchState.startRange;
                        const x0ms = new Date(sr[0]).getTime();
                        const x1ms = new Date(sr[1]).getTime();
                        const xSpan = x1ms - x0ms;
                        const midMs = (x0ms + x1ms) / 2;
                        Plotly.relayout(chartDiv, {
                            'xaxis.range': [
                                new Date(midMs - xSpan * scale / 2).toISOString(),
                                new Date(midMs + xSpan * scale / 2).toISOString()
                            ]
                        });
                    } else if (e.touches.length === 2) {
                        const t0 = e.touches[0], t1 = e.touches[1];
                        const newDist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
                        const scale = touchState.startDist / newDist;
                        const zoomX = touchState.mode !== 'zoomY';
                        const zoomY = touchState.mode !== 'zoomX';
                        applyZoom(zoomX, zoomY, touchState.midX, touchState.midY, scale);
                        touchState.startDist = newDist;
                    }
                }, { passive: false });

                chartDiv.addEventListener('touchend', function(e) {
                    if (e.touches.length === 0) touchState = null;
                }, { passive: true });

                chartDiv.on('plotly_relayout', function(eventData) {
                    if (eventData['xaxis.range[0]'] || eventData['xaxis.range'] ||
                        eventData['yaxis.range[0]'] || eventData['yaxis.range']) {
                        refreshShapeCloseBtns();
                    }
                });

                chartDiv.on('plotly_click', function(data) {
                    if (!document.getElementById('clickPriceMode').checked) return;
                    if (!data || !data.points || !data.points[0]) return;
                    const pt = data.points[0];
                    const clickedPrice = pt.y;
                    const clickedDate = new Date(pt.x);
                    if (!rawData) return;
                    const dates = rawData.chart.dates;
                    const prices = rawData.chart.prices;
                    let targetIndex = 0;
                    // 20Y / özel tarih modu
                    if (activeTimeRange === '20Y' && customStartDate) {
                        const targetTime = customStartDate.getTime();
                        for (let i = 0; i < dates.length; i++) {
                            if (new Date(dates[i]).getTime() >= targetTime) { targetIndex = i; break; }
                        }
                    } else {
                        const rangeInfo = timeRangeMap[activeTimeRange];
                        if (rangeInfo) {
                            const endDate = new Date(dates[dates.length - 1]);
                            let targetDate = new Date(endDate);
                            if (rangeInfo.unit === 'months') targetDate.setMonth(endDate.getMonth() - rangeInfo.value);
                            else if (rangeInfo.unit === 'days') targetDate.setDate(endDate.getDate() - rangeInfo.value);
                            else targetDate.setFullYear(endDate.getFullYear() - rangeInfo.value);
                            const targetTime = targetDate.getTime();
                            for (let i = 0; i < dates.length; i++) {
                                if (targetTime - new Date(dates[i]).getTime() <= 0) { targetIndex = i; break; }
                            }
                        }
                    }
                    const f = n => n.toFixed(2);
                    const dd = String(clickedDate.getDate()).padStart(2,'0');
                    const mm = String(clickedDate.getMonth()+1).padStart(2,'0');
                    const yyyy = clickedDate.getFullYear();
                    const dateStr = `${dd}.${mm}.${yyyy}`;
                    const titleHTML = buildChartTitle(activeTimeRange, dates, targetIndex, prices, clickedPrice, clickedDate);
                    if (titleHTML) {
                        const clickedTitleHTML = titleHTML.replace(
                            /(<span[^>]*font-size: 14px[^>]*>)[^<]*(<\/span>)/,
                            `$1${currentSymbol}: ${f(clickedPrice)}\u20BA <span style="font-size:10px;color:#f59e0b;">(${dateStr})</span>$2`
                        );
                        Plotly.relayout('chart', { title: { text: clickedTitleHTML, x: 0.5, y: 0.95, font: {size: 14} } });
                    }
                });
            });
        }

        function buildChartTitle(rangeKey, dates, targetIndex, prices, lastPrice, clickedDate) {
            if (!dates || !prices || targetIndex === undefined) return null;
            const f = n => n.toFixed(2);
            const fPct = n => n.toFixed(0);
            const visiblePrices = prices.slice(targetIndex);
            if (!visiblePrices.length) return null;
            let new_val_max = -Infinity, new_val_min = Infinity;
            for (const p of visiblePrices) {
                if (p > new_val_max) new_val_max = p;
                if (p < new_val_min) new_val_min = p;
            }
            const diff_peak   = ((lastPrice - new_val_max) / new_val_max) * 100;
            const diff_bottom = ((lastPrice - new_val_min) / new_val_min) * 100;
            const startPrice  = visiblePrices[0];
            const periodReturn = ((lastPrice - startPrice) / startPrice) * 100;
            const periodColor  = periodReturn >= 0 ? '#10B981' : '#EF4444';
            const periodPrefix = periodReturn >= 0 ? '+' : '';

            // Tıklanan tarih varsa oradan, yoksa periyot başından hesapla
            const refDateStr = clickedDate
                ? (() => { const d = clickedDate; const dd = String(d.getDate()).padStart(2,'0'); const mm = String(d.getMonth()+1).padStart(2,'0'); return `${d.getFullYear()}-${mm}-${dd}`; })()
                : dates[targetIndex];

            // Periyot başlangıç tarihi (sabit)
            const periodStartDateStr = dates[targetIndex];

            let goldReturnHTML = '';
            if (goldData && goldData.prices && goldData.prices.length > 0) {
                // Başlangıç: periyot başı
                let goldStartIdx = 0;
                for (let i = 0; i < goldData.dates.length; i++) {
                    if (goldData.dates[i] >= periodStartDateStr) { goldStartIdx = i; break; }
                }
                const goldStart = goldData.prices[goldStartIdx];
                // Bitiş: tıklanan tarih (veya en son fiyat)
                let goldEndIdx = goldData.prices.length - 1;
                if (clickedDate) {
                    for (let i = 0; i < goldData.dates.length; i++) {
                        if (goldData.dates[i] >= refDateStr) { goldEndIdx = i; break; }
                    }
                }
                const goldEnd = goldData.prices[goldEndIdx];
                if (goldStart > 0) {
                    const goldReturn = ((goldEnd - goldStart) / goldStart) * 100;
                    const goldColor  = goldReturn >= 0 ? '#F59E0B' : '#EF4444';
                    const goldPrefix = goldReturn >= 0 ? '+' : '';
                    const fmtGold = n => n >= 1000 ? n.toFixed(0) : n.toFixed(2);
                    goldReturnHTML = ` | <span style="font-size: 12px; color: ${goldColor};">🥇: ${goldPrefix}%${fPct(goldReturn)} (${fmtGold(goldEnd)}₺)</span>`;
                }
            }

            let usdReturnHTML = '';
            if (usdData && usdData.prices && usdData.prices.length > 0) {
                // Başlangıç: periyot başı
                let usdStartIdx = 0;
                for (let i = 0; i < usdData.dates.length; i++) {
                    if (usdData.dates[i] >= periodStartDateStr) { usdStartIdx = i; break; }
                }
                const usdStart = usdData.prices[usdStartIdx];
                // Bitiş: tıklanan tarih (veya en son fiyat)
                let usdEndIdx = usdData.prices.length - 1;
                if (clickedDate) {
                    for (let i = 0; i < usdData.dates.length; i++) {
                        if (usdData.dates[i] >= refDateStr) { usdEndIdx = i; break; }
                    }
                }
                const usdEnd = usdData.prices[usdEndIdx];
                if (usdStart > 0) {
                    const usdReturn = ((usdEnd - usdStart) / usdStart) * 100;
                    const usdColor  = usdReturn >= 0 ? '#60A5FA' : '#EF4444';
                    const usdPrefix = usdReturn >= 0 ? '+' : '';
                    usdReturnHTML = ` | <span style="font-size: 12px; color: ${usdColor};">💵: ${usdPrefix}%${fPct(usdReturn)} (${usdEnd.toFixed(2)}₺)</span>`;
                }
            }

            return `
<span style="font-size: 11px; color: #10B981;">Dip: +%${f(diff_bottom)}</span> | 
<span style="font-size: 14px; font-weight: bold; color: #fff;">${currentSymbol}: ${f(lastPrice)}₺</span> | 
<span style="font-size: 11px; color: #EF4444;">Zirve: %${f(diff_peak)}</span>
<br><span style="font-size: 12px; color: ${periodColor};">📅 ${rangeKey}: ${periodPrefix}%${fPct(periodReturn)}</span>${goldReturnHTML}${usdReturnHTML}
`;
        }

        function changeTimeRange(rangeKey, doDraw = true) {
            // 20Y butonu: her zaman sadece takvimi tetikler, grafik aralığı değiştirmez
            if (rangeKey === '20Y') {
                if (customStartDate) {
                    activeTimeRange = '20Y';
                    document.querySelectorAll('.time-range-btn').forEach(b => b.classList.remove('active-range'));
                    document.getElementById('btn20Y').classList.add('active-range');
                    applyCustomStartDate();
                }
                return;
            }
            activeTimeRange = rangeKey;
            
            document.querySelectorAll('.time-range-btn').forEach(b => b.classList.remove('active-range'));
            document.querySelector(`.time-range-btn[data-range="${rangeKey}"]`).classList.add('active-range');

            if (isUsdMode && usdRawData) {
                const rangeInfo = timeRangeMap[rangeKey];
                if (rangeInfo && rangeInfo.unit === 'years') {
                    const usdDates = usdRawData.chart.dates;
                    const firstDate = new Date(usdDates[0]);
                    const lastDate = new Date(usdDates[usdDates.length - 1]);
                    const requiredDate = new Date(lastDate);
                    requiredDate.setFullYear(lastDate.getFullYear() - rangeInfo.value);
                    const alreadyFetched = (usdRawData._loadedYears || 0) >= rangeInfo.value;
                    if (requiredDate < firstDate && !alreadyFetched) {
                        const ldr = document.getElementById('usdLoader');
                        ldr.style.display = 'block';
                        fetch(apiUrl(`/analyze_usd?s=${currentSymbol}&years=${rangeInfo.value}`))
                            .then(r => r.json())
                            .then(data => {
                                if (!data.error) {
                                    usdRawData = data;
                                    usdRawData._symbol = currentSymbol;
                                    usdRawData._loadedYears = rangeInfo.value;
                                    drawUsdChart();
                                    applyUsdTimeRange(rangeKey, usdRawData.chart.dates);
                                }
                            })
                            .catch(() => {})
                            .finally(() => { ldr.style.display = 'none'; });
                        return;
                    }
                }
                applyUsdTimeRange(rangeKey, usdRawData.chart.dates);
                return;
            }

            if (!rawData) return;

            const dates = rawData.chart.dates;
            const rangeInfo = timeRangeMap[rangeKey];

            // Yeterli veri var mı kontrol et
            if (rangeInfo && rangeInfo.unit === 'years') {
                const firstDate = new Date(dates[0]);
                const lastDate = new Date(dates[dates.length - 1]);
                const requiredDate = new Date(lastDate);
                requiredDate.setFullYear(lastDate.getFullYear() - rangeInfo.value);
                
                // Eğer istenen tarih, eldeki verinin başlangıcından önce ise yeniden veri çek
                // _loadedYears ile sonsuz döngüyü önle
                const alreadyFetched = (rawData._loadedYears || 0) >= rangeInfo.value;
                if (requiredDate < firstDate && !alreadyFetched) {
                    loadData(rangeInfo.value).then(() => {
                        // loadData içinde changeTimeRange tekrar çağrılacak (activeTimeRange üzerinden)
                    });
                    return;
                }
            }

            const prices = rawData.chart.prices;
            const lastPrice = rawData.chart.last_price;

            let targetIndex = 0; 
            let minDate = dates[0];
            
            {
                const endDate = new Date(dates[dates.length - 1]); 
                let targetDate = new Date(endDate);
                if (rangeInfo.unit === 'months') targetDate.setMonth(endDate.getMonth() - rangeInfo.value);
                else if (rangeInfo.unit === 'days') targetDate.setDate(endDate.getDate() - rangeInfo.value);
                else targetDate.setFullYear(endDate.getFullYear() - rangeInfo.value);
                
                const targetTime = targetDate.getTime();
                for (let i = 0; i < dates.length; i++) {
                    if (targetTime - new Date(dates[i]).getTime() <= 0) {
                        targetIndex = i; break;
                    }
                }
                minDate = dates[targetIndex];
            }

            let new_val_max = -Infinity, new_idx_max_date = '';
            let new_val_min = Infinity, new_idx_min_date = '';
            const visiblePrices = prices.slice(targetIndex); 
            
            for (let i = 0; i < visiblePrices.length; i++) {
                const p = visiblePrices[i];
                const d = dates[targetIndex + i];
                if (p > new_val_max) { new_val_max = p; new_idx_max_date = d; }
                if (p < new_val_min) { new_val_min = p; new_idx_min_date = d; }
            }
            
            const padding = (new_val_max - new_val_min) * 0.05;
            const diff_peak = ((lastPrice - new_val_max) / new_val_max) * 100;
            const diff_bottom = ((lastPrice - new_val_min) / new_val_min) * 100;
            const f = n => n.toFixed(2);
            
            const startPrice = visiblePrices[0];
            const periodReturn = ((lastPrice - startPrice) / startPrice) * 100;
            const periodColor = periodReturn >= 0 ? '#10B981' : '#EF4444';
            const periodPrefix = periodReturn >= 0 ? '+' : '';

            const startDateFmt = new Date(dates[targetIndex]).toLocaleDateString('tr-TR', {day:'2-digit', month:'2-digit', year:'numeric'});
            const startDateObj = new Date(dates[targetIndex]);
            const today = new Date();
            let yil = today.getFullYear() - startDateObj.getFullYear();
            let ay = today.getMonth() - startDateObj.getMonth();
            let gun = today.getDate() - startDateObj.getDate();
            if (gun < 0) { ay--; gun += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
            if (ay < 0) { yil--; ay += 12; }
            const gecenSure = [yil > 0 ? yil + 'y' : '', ay > 0 ? ay + 'a' : '', gun > 0 ? gun + 'g' : ''].filter(Boolean).join(' ') || '0g';
            document.getElementById('cariTitleText').innerHTML =
                `Cari Değerler <span style="color:#888; font-size:10px; font-weight:normal;">(${startDateFmt} — ${f(startPrice)}₺ — ${gecenSure})</span>`;

            const titleHTML = buildChartTitle(rangeKey, dates, targetIndex, prices, lastPrice);

            // Altın verisi bu aralık için yetersizse arka planda çek, gelince sadece başlığı güncelle
            const _needGoldYears = rangeInfo && rangeInfo.unit === 'years' ? rangeInfo.value : 10;
            const _updateTitle = () => {
                const t = buildChartTitle(rangeKey, dates, targetIndex, prices, lastPrice);
                if (t) Plotly.relayout('chart', { title: { text: t, x: 0.5, y: 0.95, font: {size: 14} } });
            };
            if (!goldData || (goldData.loadedYears || 0) < _needGoldYears) {
                fetchGoldData(_needGoldYears).then(_updateTitle);
            }
            if (!usdData || (usdData.loadedYears || 0) < _needGoldYears) {
                fetchUsdData(_needGoldYears).then(_updateTitle);
            }

            Plotly.relayout('chart', {
                'xaxis.range': [minDate, dates[dates.length - 1]],
                'yaxis.range': [new_val_min - padding, new_val_max + padding], 
                title: { text: titleHTML, x: 0.5, y: 0.95, font: {size: 14} },
                 
                annotations: [
                    { 
                        x: new_idx_max_date, y: new_val_max, 
                        text: `<br><b>${f(new_val_max)}</b>`, 
                        showarrow: true, 
                        arrowhead: 2, 
                        arrowcolor: '#10B981',
                        ax: -10,
                        ay: 0,
                        xanchor: 'right', 
                        font: {color: '#10B981', size: 10} 
                    }, 
                    { 
                        x: new_idx_min_date, y: new_val_min, 
                        text: `<br><b>${f(new_val_min)}</b>`, 
                        showarrow: true, 
                        arrowhead: 2, 
                        arrowcolor: '#EF4444',
                        ax: -10,
                        ay: 0,
                        xanchor: 'right', 
                        font: {color: '#EF4444', size: 10} 
                    }
                ]
            });
        }

        // --- ÇİFT DOKUNMA NAVİGASYONU ---
        function setupDoubleTap() {
            const DOUBLE_TAP_MS = 300;
            const zones = ['cariTitle', 'cari', 'descTitle', 'desc'];
            zones.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                let lastTap = 0, lastSide = null;
                el.addEventListener('touchend', function(e) {
                    const now = Date.now();
                    const rect = el.getBoundingClientRect();
                    const touch = e.changedTouches[0];
                    const side = touch.clientX > rect.left + rect.width / 2 ? 'right' : 'left';
                    if (now - lastTap < DOUBLE_TAP_MS && side === lastSide) {
                        e.preventDefault();
                        move(side === 'right' ? 1 : -1);
                        lastTap = 0;
                    } else {
                        lastTap = now;
                        lastSide = side;
                    }
                }, { passive: false });
            });
        }


        // ===== 20Y TAKVİM =====
        let customStartDate = null;
        let calViewYear = new Date().getFullYear();
        let calViewMonth = new Date().getMonth();
        let calTempSelected = null;

        function open20YCalendar(e) {
            e.stopPropagation();
            const modal = document.getElementById('calModal');
            modal.classList.add('open');
            const init = customStartDate ? new Date(customStartDate) : (() => { const d = new Date(); d.setFullYear(d.getFullYear()-5); return d; })();
            calViewYear  = init.getFullYear();
            calViewMonth = init.getMonth();
            calTempSelected = customStartDate ? new Date(customStartDate) : null;
            renderCalendar();
        }

        function closeCalModal() {
            document.getElementById('calModal').classList.remove('open');
        }

        function calNavMonth(dir) {
            calViewMonth += dir;
            if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
            if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
            renderCalendar();
        }

        function calNavYear(dir) {
            calViewYear += dir;
            renderCalendar();
        }

        function renderCalendar() {
            const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
            document.getElementById('calMonthLabel').textContent = months[calViewMonth];
            document.getElementById('calYearLabel').textContent = calViewYear;

            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';

            const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
            const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();

            let minAllowedDate = null;
            if (rawData && rawData.chart && rawData.chart.dates && rawData.chart.dates.length) {
                minAllowedDate = new Date(rawData.chart.dates[0]);
            }
            const today = new Date();
            today.setHours(23,59,59,999);

            for (let i = 0; i < startOffset; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const thisDate = new Date(calViewYear, calViewMonth, d);
                const isSelected = calTempSelected &&
                    calTempSelected.getFullYear() === calViewYear &&
                    calTempSelected.getMonth() === calViewMonth &&
                    calTempSelected.getDate() === d;
                const isToday = new Date().toDateString() === thisDate.toDateString();
                const isDisabled = (minAllowedDate && thisDate < minAllowedDate) || thisDate > today;
                const dow = thisDate.getDay();
                const isWeekend = dow === 0 || dow === 6;

                const cell = document.createElement('button');
                cell.textContent = d;
                cell.className = 'cal-day' +
                    (isSelected ? ' selected' : '') +
                    (isToday && !isSelected ? ' today' : '') +
                    (isDisabled ? ' disabled' : '') +
                    (isWeekend && !isDisabled ? ' weekend' : '');

                if (!isDisabled) {
                    cell.addEventListener('click', function(e) {
                        e.stopPropagation();
                        calTempSelected = new Date(calViewYear, calViewMonth, d);
                        renderCalendar();
                    });
                }
                grid.appendChild(cell);
            }
        }

        function applyCalDate() {
            if (!calTempSelected) return;
            customStartDate = new Date(calTempSelected);
            closeCalModal();
            updateBtn20YLabel();
            applyCustomStartDate();
        }

        function clearCalDate() {
            customStartDate = null;
            calTempSelected = null;
            closeCalModal();
            document.getElementById('btn20YLabel').innerHTML = '📅';
            document.getElementById('btn20Y').classList.remove('active-range');
            // Önceki aktif range'e dön (20Y değilse), yoksa 5Y'e dön
            const fallback = (activeTimeRange && activeTimeRange !== '20Y') ? activeTimeRange : '5Y';
            changeTimeRange(fallback);
        }

        function updateBtn20YLabel() {
            if (!customStartDate) {
                document.getElementById('btn20YLabel').innerHTML = '📅';
                return;
            }
            const dd = String(customStartDate.getDate()).padStart(2,'0');
            const mm = String(customStartDate.getMonth()+1).padStart(2,'0');
            const yyyy = customStartDate.getFullYear();
            document.getElementById('btn20YLabel').innerHTML =
                `<span style="font-size:9px;line-height:1.3;display:block;">${dd}.${mm}</span><span style="font-size:9px;line-height:1.3;display:block;">${yyyy}</span>`;
        }

        function applyCustomStartDate() {
            if (!customStartDate || !rawData) return;
            activeTimeRange = '20Y';
            document.querySelectorAll('.time-range-btn').forEach(b => b.classList.remove('active-range'));
            document.getElementById('btn20Y').classList.add('active-range');

            const dates  = rawData.chart.dates;
            const prices = rawData.chart.prices;
            const lastPrice = rawData.chart.last_price;

            const targetTime = customStartDate.getTime();
            let targetIndex = 0;
            for (let i = 0; i < dates.length; i++) {
                if (new Date(dates[i]).getTime() >= targetTime) { targetIndex = i; break; }
            }
            const minDate = dates[targetIndex];

            let new_val_max = -Infinity, new_idx_max_date = '';
            let new_val_min = Infinity,  new_idx_min_date = '';
            const visiblePrices = prices.slice(targetIndex);
            for (let i = 0; i < visiblePrices.length; i++) {
                const p = visiblePrices[i];
                const dd = dates[targetIndex + i];
                if (p > new_val_max) { new_val_max = p; new_idx_max_date = dd; }
                if (p < new_val_min) { new_val_min = p; new_idx_min_date = dd; }
            }
            const padding = (new_val_max - new_val_min) * 0.05;
            const f = n => n.toFixed(2);

            const startDateFmt = customStartDate.toLocaleDateString('tr-TR', {day:'2-digit', month:'2-digit', year:'numeric'});
            const today = new Date();
            let yil = today.getFullYear() - customStartDate.getFullYear();
            let ay  = today.getMonth() - customStartDate.getMonth();
            let gun = today.getDate()  - customStartDate.getDate();
            if (gun < 0) { ay--; gun += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
            if (ay  < 0) { yil--; ay += 12; }
            const gecenSure = [yil>0?yil+'y':'', ay>0?ay+'a':'', gun>0?gun+'g':''].filter(Boolean).join(' ') || '0g';
            document.getElementById('cariTitleText').innerHTML =
                `Cari Değerler <span style="color:#888; font-size:10px; font-weight:normal;">(${startDateFmt} — ${f(visiblePrices[0])}₺ — ${gecenSure})</span>`;

            const titleHTML = buildChartTitle('20Y', dates, targetIndex, prices, lastPrice);
            Plotly.relayout('chart', {
                'xaxis.range': [minDate, dates[dates.length - 1]],
                'yaxis.range': [new_val_min - padding, new_val_max + padding],
                title: { text: titleHTML, x: 0.5, y: 0.95, font: {size: 14} },
                annotations: [
                    { x: new_idx_max_date, y: new_val_max, text: `<br><b>${f(new_val_max)}</b>`, showarrow: true, arrowhead: 2, arrowcolor: '#10B981', ax: -10, ay: 0, xanchor: 'right', font: {color: '#10B981', size: 10} },
                    { x: new_idx_min_date, y: new_val_min, text: `<br><b>${f(new_val_min)}</b>`, showarrow: true, arrowhead: 2, arrowcolor: '#EF4444', ax: -10, ay: 0, xanchor: 'right', font: {color: '#EF4444', size: 10} }
                ]
            });
        }

        // Modal dışına tıklayınca kapat
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('calModal');
            if (modal && modal.classList.contains('open')) {
                const box = document.querySelector('.cal-box');
                if (box && box.contains(e.target)) return;
                closeCalModal();
            }
        });

        window.onload = () => {
            loadCustomLists();
            loadFavorites();
            document.getElementById('listSelect').value = "Tüm Hisseler";
            document.getElementById('symbol').value = currentSymbol;
            loadData();
            const initIdx = activeList.indexOf(currentSymbol);
            schedulePrefetch(initIdx >= 0 ? initIdx : 0);
            updateSymbolIndex();
            setupDoubleTap();

            // Checkbox işareti kaldırılınca başlığı normale döndür
            document.getElementById('clickPriceMode').addEventListener('change', function() {
                if (!this.checked && rawData) {
                    changeTimeRange(activeTimeRange, false);
                }
            });
        };
    </script>


    <!-- ===== TAKVİM MODALİ ===== -->
    <div id="calModal">
        <div class="cal-box">
            <div class="cal-header">
                <span class="cal-title">📅 Başlangıç Tarihi Seç</span>
                <button class="cal-close" onclick="closeCalModal()">✕ Kapat</button>
            </div>
            <div class="cal-nav">
                <button class="cal-nav-btn" onclick="calNavMonth(-1)">‹</button>
                <span id="calMonthLabel"></span>
                <button class="cal-nav-btn" onclick="calNavMonth(1)">›</button>
            </div>
            <div class="cal-year-nav">
                <button class="cal-year-btn" onclick="calNavYear(-1)">« -1Y</button>
                <span id="calYearLabel"></span>
                <button class="cal-year-btn" onclick="calNavYear(1)">+1Y »</button>
            </div>
            <div class="cal-dow">
                <span>Pt</span><span>Sa</span><span>Ça</span><span>Pe</span><span>Cu</span>
                <span class="weekend">Ct</span><span class="weekend">Pz</span>
            </div>
            <div id="calGrid"></div>
            <div class="cal-footer">
                <button class="cal-apply" onclick="applyCalDate()">✓ Uygula</button>
                <button class="cal-clear" onclick="clearCalDate()">✕ Temizle (20Y)</button>
            </div>
        </div>
    </div>
</body>

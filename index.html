<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <link rel="apple-touch-icon" href="/icon.png">

    <title>BorsaMobil</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Üst Linkler */
        .top-links { display: flex; gap: 6px; overflow-x: auto; padding: 6px 10px; background: #111; border-bottom: 1px solid #333; flex-shrink: 0; scrollbar-width: none; }
        .top-links::-webkit-scrollbar { display: none; }
        .top-links a { color: #ccc; text-decoration: none; font-size: 11px; border: 1px solid #444; padding: 3px 10px; border-radius: 12px; white-space: nowrap; background: #222; font-weight: bold;}

        /* ===== MASAÜSTÜ ANA LAYOUT ===== */
        .desktop-layout { flex: 1; display: flex; flex-direction: row; overflow: hidden; min-height: 0; }

        /* Sol Panel: Kontroller */
        .controls {
            width: 210px; min-width: 200px; max-width: 220px;
            background: #111; border-right: 1px solid #333;
            display: flex; flex-direction: column; gap: 5px;
            padding: 8px 6px; overflow-y: auto; overflow-x: hidden; flex-shrink: 0;
        }
        .controls::-webkit-scrollbar { width: 4px; }
        .controls::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .ctrl-section { display: flex; flex-direction: column; gap: 3px; }
        .ctrl-label { font-size: 9px; color: #555; font-weight: bold; letter-spacing: 0.8px; text-transform: uppercase; padding: 4px 2px 1px; border-top: 1px solid #222; margin-top: 2px; }
        .ctrl-label:first-child { border-top: none; margin-top: 0; }

        .row { display: flex; align-items: center; gap: 4px; }
        button { background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 7px 4px; font-size: 11px; font-weight: bold; flex: 1; cursor: pointer; transition: background 0.15s; }
        button:hover { background: #383838; }
        .btn-nav { flex: none; width: 30px; height: 30px; background: #5D5CDE; border: none; font-size: 15px; display:flex; justify-content:center; align-items:center; padding: 0; }
        input, select { background: #000; color: #fff; border: 1px solid #444; border-radius: 6px; height: 30px; font-size: 12px; padding: 0 4px; }
        select { width: 100%; }

        /* Zaman Aralığı Butonları - 5x2 grid */
        .time-range-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .time-range-btn { font-size: 10px !important; padding: 5px 2px !important; }

        /* Sağ Alan: Grafik + Veri */
        .content-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
        #chartArea { width: 100%; height: 63vh; min-height: 380px; background: #000; position: relative; flex-shrink: 0; }
        
        /* Veri Gridleri ve Başlıklar */
        .section-title { 
            font-size: 12px; color: #5D5CDE; padding: 5px 8px; background: #151515; 
            border-bottom: 1px solid #333; font-weight: bold; position: sticky; top:0; z-index: 5;
            white-space: normal; word-wrap: break-word; line-height: 1.4;
        }
        
        /* 4 sütunlu grid */
        .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; padding: 3px; background: #0a0a0a; font-size: 11px; }
        .info-item { display: flex; justify-content: space-between; padding: 3px 6px; border-bottom: 1px solid #1a1a1a; align-items: center; gap: 4px; background: #111; }
        .info-item span:first-child { color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; }
        .info-item span:last-child { font-weight: bold; white-space: nowrap; font-size: 11px; }
        
        .val-pos { color: #10B981 !important; }
        .val-neg { color: #EF4444 !important; }
        
        .desc-box { padding: 8px 10px; font-size: 11px; color: #ccc; line-height: 1.5; background: #111; font-style: italic; }
        
        /* Arama / Tamamlama Kutusu */
        .input-wrapper { flex: 1; position: relative; height: 30px;}
        #symbol { width: 100%; height: 100%; text-align: center; font-weight: bold; border-color: #5D5CDE; text-transform: uppercase; padding-left: 22px; position: relative; z-index: 1; font-size: 12px;}

        /* Liste İkonu */
        #listIconBtn {
            position: absolute;
            left: 4px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            background: none;
            border: none;
            color: #5D5CDE;
            font-size: 14px;
            cursor: pointer;
            padding: 2px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 3px;
            flex: none;
            pointer-events: auto;
        }
        #listIconBtn:active { background: #333; }

        /* Hisse Listesi Dropdown */
        #stockListDropdown {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 1px solid #5D5CDE;
            border-radius: 8px 8px 0 0;
            max-height: 380px;
            overflow-y: auto;
            display: none;
            z-index: 60;
        }
        #stockListDropdown.open { display: block; }
        .stock-list-header {
            padding: 6px 10px;
            font-size: 10px;
            color: #5D5CDE;
            background: #111;
            border-bottom: 1px solid #333;
            font-weight: bold;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .stock-list-item {
            padding: 8px 12px;
            border-bottom: 1px solid #222;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .stock-list-item:hover, .stock-list-item:active { background: #2a2a3a; }
        .stock-list-item.current { color: #5D5CDE; }
        .stock-list-item .item-idx { color: #555; font-size: 10px; margin-right: 8px; min-width: 24px; text-align: right; }
        #symbolIdx {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            color: #EF4444;
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
            z-index: 2;
            line-height: 1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .suggestions { position: absolute; bottom: 100%; left: 0; right: 0; background: #222; border: 1px solid #444; max-height: 200px; overflow-y: auto; display: none; z-index: 50; border-radius: 6px 6px 0 0;}
        .suggestion-item { padding: 10px; border-bottom: 1px solid #333; color: #fff; font-size: 13px;}
        
        .active-range { background: #5D5CDE !important; border-color: #5D5CDE; }
        .measure-active { background: #c2410c !important; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .btn-tool { background: #1e1e1e; border-color: #444; font-size: 11px;}
        .btn-tool:hover { background: #2a2a2a; }
        
        #loader { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 100; color: #5D5CDE; font-weight: bold; font-size: 14px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px;}

        /* Yıldız Butonu */
        #starBtn {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            color: #888;
            transition: transform 0.15s, color 0.2s;
            padding: 0;
        }
        #starBtn:active { transform: scale(1.35); }
        #starBtn.starred { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6); }

        #redStarBtn {
            position: absolute;
            top: 12px;
            right: 50px;
            z-index: 10;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
            color: #888;
            transition: transform 0.15s, color 0.2s, opacity 0.2s;
            padding: 0;
        }
        #redStarBtn:active { transform: scale(1.35); }
        #redStarBtn.red-starred { color: #EF4444; text-shadow: 0 0 8px rgba(239,68,68,0.6); }

        /* ===== T-VIEW MODAL ===== */
        #tvModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97);
            z-index: 2000;
            flex-direction: column;
        }
        #tvModal.active { display: flex; }

        .tv-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #111;
            border-bottom: 2px solid #5D5CDE;
            flex-shrink: 0;
        }
        .tv-modal-title {
            font-weight: bold;
            color: #5D5CDE;
            font-size: 13px;
            flex: 1;
        }
        .tv-modal-close {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            flex: none;
        }
        .tv-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            -webkit-overflow-scrolling: touch;
        }

        /* Modal Bölüm Başlıkları */
        .tv-section-title {
            font-size: 11px;
            color: #5D5CDE;
            padding: 6px 4px 4px;
            font-weight: bold;
            border-bottom: 1px solid #333;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .tv-section {
            margin-bottom: 8px;
        }
        .tv-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
        }
        .tv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 6px;
            background: #111;
            font-size: 11px;
            border-bottom: 1px solid #1a1a1a;
            gap: 4px;
        }
        .tv-item-key { color: #888; flex-shrink: 0; }
        .tv-item-val { font-weight: bold; text-align: right; }
        .tv-pos { color: #10B981; }
        .tv-neg { color: #EF4444; }
        .tv-loader {
            text-align: center;
            padding: 40px;
            color: #5D5CDE;
            font-size: 13px;
        }

        /* ===== AI ANALİZ MODAL ===== */
        #aiModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97);
            z-index: 2000;
            flex-direction: column;
        }
        #aiModal.active { display: flex; }
        #newsModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97);
            z-index: 2000;
            flex-direction: column;
        }
        #newsModal.active { display: flex; }
        .news-source-list { margin-top: 16px; border-top: 1px solid #333; padding-top: 10px; }
        .news-source-item { font-size: 11px; padding: 6px 4px; border-bottom: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 3px; }
        .news-source-item a { color: #93c5fd; text-decoration: none; word-break: break-all; line-height: 1.4; }
        .news-source-item a:hover { color: #60a5fa; text-decoration: underline; }
        .news-source-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .news-source-date { color: #666; font-size: 10px; }
        .news-source-badge {
            font-size: 9px; font-weight: bold; padding: 1px 6px; border-radius: 8px;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .badge-web        { background: #1e3a5f; color: #93c5fd; }
        .badge-x          { background: #1a1a1a; color: #e5e7eb; border: 1px solid #333; }
        .badge-tradingview{ background: #0f2a1a; color: #4ade80; }
        .badge-midas      { background: #2a1a0f; color: #fb923c; }
        .badge-investing  { background: #1a0f2a; color: #c084fc; }
        .badge-default    { background: #222; color: #aaa; }
        .ai-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #111;
            border-bottom: 2px solid #a78bfa;
            flex-shrink: 0;
        }
        .ai-modal-title {
            font-weight: bold;
            color: #a78bfa;
            font-size: 13px;
            flex: 1;
        }
        .ai-modal-close {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            flex: none;
        }
        .ai-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            -webkit-overflow-scrolling: touch;
            font-size: 13px;
            line-height: 1.7;
            color: #e0e0e0;
        }

        /* ===== AI METİN TİPOGRAFİ ===== */
        /* Markdown bold: **metin** → <strong> */
        .ai-row-text strong,
        .ai-card-header-text strong {
            color: #fff;
            font-weight: 700;
        }
        /* Inline em/italic */
        .ai-row-text em {
            color: #c4b5fd;
            font-style: normal;
        }
        /* Sayısal vurgular */
        .ai-num-highlight {
            color: #facc15;
            font-weight: 700;
        }
        /* Alt-başlık (## satırları) */
        .ai-sub-heading {
            font-size: 12px;
            font-weight: 700;
            color: #a78bfa;
            border-left: 3px solid #7c3aed;
            padding-left: 8px;
            margin: 6px 0 2px;
            display: block;
        }
        /* Pozitif / Negatif renkli satırlar */
        .ai-row-text.positive { color: #86efac; }
        .ai-row-text.negative { color: #fca5a5; }
        .ai-card {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .ai-card-header {
            background: #1e1530;
            border-bottom: 1px solid #3a2a5a;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ai-card-header-text {
            color: #c4b5fd;
            font-size: 13px;
            font-weight: 700;
            flex: 1;
        }
        .ai-card-body {
            padding: 4px 12px 8px;
        }
        .ai-loader {
            text-align: center;
            padding: 50px 20px;
            color: #a78bfa;
            font-size: 13px;
        }
        .ai-error {
            text-align: center;
            padding: 40px 20px;
            color: #EF4444;
            font-size: 13px;
        }
        .ai-disclaimer {
            margin-top: 16px;
            padding: 8px 10px;
            background: #1a1a1a;
            border-left: 3px solid #a78bfa;
            border-radius: 4px;
            font-size: 11px;
            color: #888;
            font-style: italic;
        }
        .ai-model-badge {
            display: inline-block;
            font-size: 10px;
            color: #666;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 2px 8px;
            margin-bottom: 12px;
        }

        .ai-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #1e1e1e;
            font-size: 12px;
            line-height: 1.6;
        }
        .ai-row:last-child { border-bottom: none; }
        .ai-row-bullet {
            flex: 0 0 5px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #a78bfa;
            margin-top: 7px;
        }
        .ai-row-text {
            flex: 1;
            color: #d0d0d0;
        }
        .ai-verdict-al   { color: #10B981; font-weight: bold; }
        .ai-verdict-sat  { color: #EF4444; font-weight: bold; }
        .ai-verdict-bekle { color: #F59E0B; font-weight: bold; }

        /* ===== DOLAR MOD BUTONU ===== */
        #usdModeBtn {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 10;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            color: #666;
            transition: transform 0.15s, color 0.2s, background 0.2s;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #usdModeBtn:active { transform: scale(1.2); }
        #usdModeBtn.usd-active {
            color: #10B981;
            background: rgba(16, 185, 129, 0.18);
            border-color: #10B981;
            text-shadow: 0 0 8px rgba(16,185,129,0.6);
        }
        #usdLoader {
            position: absolute;
            top: 50px;
            left: 8px;
            z-index: 10;
            font-size: 10px;
            color: #10B981;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            display: none;
        }
    
        /* ===== TAKVİM MODALİ ===== */
        #calModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.88);
            z-index: 4000;
            align-items: center;
            justify-content: center;
        }
        #calModal.open { display: flex; }
        .cal-box {
            background: #1a1a1a;
            border: 1px solid #5D5CDE;
            border-radius: 14px;
            padding: 18px 14px 14px;
            width: 296px;
            max-width: 94vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .cal-title {
            color: #5D5CDE;
            font-weight: bold;
            font-size: 13px;
        }
        .cal-close {
            background: #333 !important;
            border: 1px solid #555 !important;
            color: #fff !important;
            border-radius: 6px !important;
            padding: 4px 10px !important;
            font-size: 12px !important;
            cursor: pointer !important;
            flex: none !important;
            width: auto !important;
            height: auto !important;
        }
        .cal-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 6px;
        }
        .cal-nav-btn {
            background: #2a2a2a !important;
            border: 1px solid #444 !important;
            color: #fff !important;
            border-radius: 8px !important;
            width: 36px !important;
            height: 36px !important;
            font-size: 18px !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            flex: none !important;
            padding: 0 !important;
        }
        .cal-nav-btn:active { background: #3a3a3a !important; }
        #calMonthLabel {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            flex: 1;
        }
        .cal-dow {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
            margin-bottom: 4px;
        }
        .cal-dow span {
            font-size: 10px;
            color: #666;
            padding: 2px 0;
        }
        .cal-dow span.weekend { color: #f87171; }
        #calGrid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        .cal-day {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            color: #ccc;
            font-size: 11px;
            padding: 6px 2px;
            cursor: pointer;
            text-align: center;
            line-height: 1;
            flex: none !important;
            width: auto !important;
            height: auto !important;
        }
        .cal-day:active { opacity: 0.7; }
        .cal-day.weekend { color: #f87171; }
        .cal-day.selected { background: #5D5CDE !important; color: #fff !important; border-color: #5D5CDE !important; }
        .cal-day.today { border-color: #5D5CDE !important; }
        .cal-day.disabled { color: #3a3a3a !important; cursor: default !important; pointer-events: none; }
        .cal-footer {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }
        .cal-apply {
            flex: 1;
            background: #5D5CDE !important;
            border: none !important;
            color: #fff !important;
            border-radius: 8px !important;
            padding: 10px !important;
            font-size: 13px !important;
            font-weight: bold !important;
            cursor: pointer !important;
            height: auto !important;
        }
        .cal-clear {
            flex: 1;
            background: #2a2a2a !important;
            border: 1px solid #444 !important;
            color: #aaa !important;
            border-radius: 8px !important;
            padding: 10px !important;

        // --- ARAÇLAR ---
        // Ölçüm modu: çizgi üzerindeyken sürükle = ölçüm, boşlukta = pan
        let _measureHovering = false;
        let _measureDragging = false;
        let _measureStartX = null, _measureStartY = null;
        let _measureStartDataX = null, _measureStartDataY = null;
        let _measureOverlay = null;

        function toggleMeasure() {
            isMeasureMode = !isMeasureMode;
            const btn = document.getElementById('measureBtn');
            const chartDiv = document.getElementById('chart');
            if (isMeasureMode) {
                btn.classList.add('measure-active');
                Plotly.relayout(chartDiv, { 'dragmode': 'pan' });
                _attachMeasureListeners(chartDiv);
            } else {
                btn.classList.remove('measure-active');
                clearAllShapes();
                _detachMeasureListeners(chartDiv);
            }
        }

        function clearAllShapes() {
            const chartDiv = document.getElementById('chart');
            Plotly.relayout(chartDiv, { 'dragmode': 'pan', 'shapes': [] });
            document.querySelectorAll('.shape-close-btn').forEach(b => b.remove());
            if (_measureOverlay) { _measureOverlay.remove(); _measureOverlay = null; }
        }

        function _pixelToData(chartDiv, px, py) {
            const l = chartDiv.layout;
            if (!l || !l.xaxis || !l.yaxis) return null;
            const xRange = l.xaxis.range;
            const yRange = l.yaxis.range;
            if (!xRange || !yRange) return null;
            const margin = { l: l.margin.l || 40, r: l.margin.r || 10, t: l.margin.t || 30, b: l.margin.b || 20 };
            const rect = chartDiv.getBoundingClientRect();
            const plotW = rect.width  - margin.l - margin.r;
            const plotH = rect.height - margin.t - margin.b;
            const ratioX = (px - margin.l) / plotW;
            const ratioY = 1 - (py - margin.t) / plotH;
            const x0ms = new Date(xRange[0]).getTime();
            const x1ms = new Date(xRange[1]).getTime();
            const dataX = new Date(x0ms + ratioX * (x1ms - x0ms)).toISOString();
            const dataY = parseFloat(yRange[0]) + ratioY * (parseFloat(yRange[1]) - parseFloat(yRange[0]));
            return { x: dataX, y: dataY };
        }

        function _measureMouseDown(e) {
            if (!isMeasureMode || !_measureHovering) return;
            e.preventDefault();
            e.stopPropagation();
            _measureDragging = true;
            const chartDiv = document.getElementById('chart');
            const rect = chartDiv.getBoundingClientRect();
            _measureStartX = e.clientX - rect.left;
            _measureStartY = e.clientY - rect.top;
            const d = _pixelToData(chartDiv, _measureStartX, _measureStartY);
            if (d) { _measureStartDataX = d.x; _measureStartDataY = d.y; }
            let svg = chartDiv.querySelector('svg.main-svg');
            if (!svg) svg = chartDiv.querySelector('svg');
            if (svg && !_measureOverlay) {
                _measureOverlay = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                _measureOverlay.setAttribute('fill', 'rgba(93,92,222,0.2)');
                _measureOverlay.setAttribute('stroke', '#5D5CDE');
                _measureOverlay.setAttribute('stroke-width', '1');
                _measureOverlay.style.pointerEvents = 'none';
                svg.appendChild(_measureOverlay);
            }
        }

        function _measureMouseMove(e) {
            if (!isMeasureMode || !_measureDragging || !_measureOverlay) return;
            const chartDiv = document.getElementById('chart');
            const rect = chartDiv.getBoundingClientRect();
            const curX = e.clientX - rect.left;
            const curY = e.clientY - rect.top;
            const x = Math.min(_measureStartX, curX);
            const y = Math.min(_measureStartY, curY);
            const w = Math.abs(curX - _measureStartX);
            const h = Math.abs(curY - _measureStartY);
            _measureOverlay.setAttribute('x', x);
            _measureOverlay.setAttribute('y', y);
            _measureOverlay.setAttribute('width', w);
            _measureOverlay.setAttribute('height', h);
        }

        function _measureMouseUp(e) {
            if (!isMeasureMode || !_measureDragging) return;
            _measureDragging = false;
            if (_measureOverlay) { _measureOverlay.remove(); _measureOverlay = null; }
            const chartDiv = document.getElementById('chart');
            const rect = chartDiv.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;
            const dEnd = _pixelToData(chartDiv, endX, endY);
            if (!dEnd || !_measureStartDataX || !_measureStartDataY) return;
            if (Math.abs(endX - _measureStartX) < 5 && Math.abs(endY - _measureStartY) < 5) return;

            const x0 = _measureStartDataX < dEnd.x ? _measureStartDataX : dEnd.x;
            const x1 = _measureStartDataX < dEnd.x ? dEnd.x : _measureStartDataX;
            const y0 = Math.min(_measureStartDataY, dEnd.y);
            const y1 = Math.max(_measureStartDataY, dEnd.y);

            const pct = ((y1 - y0) / y0) * 100;
            const days = Math.abs(Math.round((new Date(x1) - new Date(x0)) / 86400000));
            const colorFill = pct >= 0 ? 'rgba(16,185,129,0.25)' : 'rgba(239,68,68,0.25)';

            const existingShapes = (chartDiv.layout.shapes || []).slice();
            const newShape = {
                type: 'rect', x0, x1, y0, y1,
                fillcolor: colorFill,
                line: { width: 0 },
                label: { text: `<b>%${pct.toFixed(2)}</b><br>${days}G`, font: { size: 12, color: '#fff' } }
            };
            Plotly.relayout(chartDiv, { shapes: [...existingShapes, newShape] }).then(() => {
                renderShapeCloseBtn(existingShapes.length);
            });
        }

        let _mDown = null, _mMove = null, _mUp = null;
        function _attachMeasureListeners(chartDiv) {
            _mDown = _measureMouseDown;
            _mMove = _measureMouseMove;
            _mUp   = _measureMouseUp;
            chartDiv.addEventListener('mousedown', _mDown, true);
            window.addEventListener('mousemove', _mMove);
            window.addEventListener('mouseup', _mUp);
            chartDiv.on('plotly_hover',  () => { _measureHovering = true;  chartDiv.style.cursor = 'crosshair'; });
            chartDiv.on('plotly_unhover',() => { _measureHovering = false; chartDiv.style.cursor = ''; });
        }
        function _detachMeasureListeners(chartDiv) {
            if (_mDown) chartDiv.removeEventListener('mousedown', _mDown, true);
            if (_mMove) window.removeEventListener('mousemove', _mMove);
            if (_mUp)   window.removeEventListener('mouseup',   _mUp);
            chartDiv.style.cursor = '';
            _measureHovering = false;
            _measureDragging = false;
        }

        function removeShapeAt(idx) {
            const chartDiv = document.getElementById('chart');
            const shapes = (chartDiv.layout.shapes || []).slice();
            shapes.splice(idx, 1);
            Plotly.relayout(chartDiv, { shapes });
            document.querySelectorAll('.shape-close-btn').forEach(b => b.remove());
            shapes.forEach((_, i) => renderShapeCloseBtn(i));
        }

        function renderShapeCloseBtn(shapeIdx) {
            const chartDiv = document.getElementById('chart');
            const layout = chartDiv.layout;
            const shapes = layout.shapes || [];
            if (shapeIdx >= shapes.length) return;
            const shape = shapes[shapeIdx];

            const rect = chartDiv.getBoundingClientRect();
            const ml = layout.margin.l || 40, mr = layout.margin.r || 10;
            const mt = layout.margin.t || 30, mb = layout.margin.b || 20;
            const plotW = rect.width  - ml - mr;
            const plotH = rect.height - mt - mb;

            const xRange = layout.xaxis.range;
            const yRange = layout.yaxis.range;
            const x0ms = new Date(xRange[0]).getTime();
            const x1ms = new Date(xRange[1]).getTime();
            const y0v  = parseFloat(yRange[0]);
            const y1v  = parseFloat(yRange[1]);

            const shapeX1ms = Math.max(new Date(shape.x0).getTime(), new Date(shape.x1).getTime());
            const shapeYtop = Math.max(parseFloat(shape.y0), parseFloat(shape.y1));

            const rightX = ml + ((shapeX1ms - x0ms) / (x1ms - x0ms)) * plotW;
            const topY   = mt + ((y1v - shapeYtop) / (y1v - y0v)) * plotH;

            if (rightX < ml || rightX > rect.width - mr || topY < mt || topY > rect.height - mb) return;

            const btn = document.createElement('button');
            btn.className = 'shape-close-btn';
            btn.dataset.shapeIdx = shapeIdx;
            btn.textContent = '\u00d7';
            btn.style.cssText = 'position:absolute;left:' + (rightX - 9) + 'px;top:' + (topY - 9) + 'px;width:20px;height:20px;background:rgba(20,20,20,0.9);border:1px solid #888;border-radius:50%;color:#fff;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;padding:0;touch-action:manipulation;font-weight:bold;';
            const doRemove = (e) => { e.preventDefault(); e.stopPropagation(); removeShapeAt(parseInt(btn.dataset.shapeIdx)); };

        // --- T-VIEW MODAL ---
        function formatTVNum(val, key) {
            if (val === null || val === undefined) return '--';
            if (key === 'Son Fiyat' || key === 'SMA 50' || key === 'SMA 200') {
                return val.toFixed(2) + ' ₺';
            }
            if (key === 'Piyasa Değeri' || key === 'Toplam Gelir' || key === 'Net Kar' ||
                key === 'FAVÖK' || key === 'Net Borç' || key === 'Hacim' || key === '10G Ort. Hacim') {
                const abs = Math.abs(val);
                const sign = val < 0 ? '-' : '';
                if (abs >= 1e12) return sign + (abs/1e12).toFixed(2) + ' T';
                if (abs >= 1e9)  return sign + (abs/1e9).toFixed(2) + ' Mr';
                if (abs >= 1e6)  return sign + (abs/1e6).toFixed(2) + ' Mn';
                if (abs >= 1e3)  return sign + (abs/1e3).toFixed(2) + ' B';
                return val.toFixed(2);
            }
            if (key.includes('%') || key === 'Değişim %') {
                const prefix = val > 0 ? '+' : '';
                return prefix + val.toFixed(2) + '%';
            }
            if (typeof val === 'number') return val.toFixed(2);
            return val;
        }

        function getTVColor(val, key) {
            const colorKeys = ['Değişim %','Net Kar','Haftalık %','Aylık %','3 Aylık %','YTD %','Yıllık %',
                               'Brüt Kar Marjı %','Faaliyet Kar Marjı %','Net Kar Marjı %',
                               'Özkaynak Karlılığı %','Teknik Puan'];
            if (colorKeys.includes(key) && typeof val === 'number') {
                return val > 0 ? 'tv-pos' : (val < 0 ? 'tv-neg' : '');
            }
            return '';
        }

        function renderAIAnalysis(text, company, model) {
            const body = document.getElementById('aiModalBody');

            function formatMarkdown(s) {
                s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
                s = s.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
                s = s.replace(/([\+\-]?[\d,.]+\s*(?:%|₺|TL|M\b|Mr\b|Mn\b|Milyar\b|Milyon\b|x\b))/g,
                    '<span class="ai-num-highlight">$1</span>');
                s = s.replace(/\bAL\b/g, '<span class="ai-verdict-al">AL</span>');
                s = s.replace(/\bSAT\b/g, '<span class="ai-verdict-sat">SAT</span>');
                s = s.replace(/\bBEKLE\b/g, '<span class="ai-verdict-bekle">BEKLE</span>');
                return s;
            }

            function sentimentClass(s) {
                if (/artış|yüksel|güçlü|pozitif|büyüme|rekor|al\b|kar\b|fırsat/i.test(s)) return 'positive';
                if (/düşüş|zayıf|negatif|risk|kayıp|sat\b|borç|endişe/i.test(s))           return 'negative';
                return '';
            }

            const lines = text.split('\n').map(l => l.trim());

            const sections = [];
            let current = null;
            for (const line of lines) {
                if (!line) continue;
                if (/^#{1,3}\s/.test(line)) {
                    const heading = line.replace(/^#{1,3}\s*/, '');
                    if (current) {
                        current.rows.push({ type: 'heading', text: heading });
                    } else {
                        sections.push({ title: null, rows: [{ type: 'heading', text: heading }] });
                    }
                    continue;
                }
                if (/^\d+\./.test(line) || /^[📊💰📈⚠️🎯🏢✅💵🏦📉🔎💡📰]/.test(line)) {
                    if (current) sections.push(current);
                    current = { title: line, rows: [] };
                } else if (current) {
                    const clean = line.replace(/^[-•*\d+\.\s]+/, '').trim();
                    if (clean) current.rows.push({ type: 'bullet', text: clean });
                } else {
                    sections.push({ title: null, rows: [{ type: 'bullet', text: line }] });
                }
            }
            if (current) sections.push(current);

            let html = '';
            if (model) html += `<div class="ai-model-badge">🤖 ${model}</div>`;

            for (const sec of sections) {
                if (sec.rows.length === 0 && !sec.title) continue;
                html += `<div class="ai-card">`;
                if (sec.title) {
                    html += `<div class="ai-card-header">
                        <div class="ai-card-header-text">${formatMarkdown(sec.title)}</div>
                    </div>`;
                }
                if (sec.rows.length > 0) {
                    html += `<div class="ai-card-body">`;
                    for (const row of sec.rows) {
                        if (row.type === 'heading') {
                            html += `<span class="ai-sub-heading">${formatMarkdown(row.text)}</span>`;
                        } else {
                            const sc = sentimentClass(row.text);
                            html += `<div class="ai-row">
                                <div class="ai-row-bullet"></div>
                                <div class="ai-row-text ${sc}">${formatMarkdown(row.text)}</div>
                            </div>`;
                        }
                    }
                    html += `</div>`;
                }
                html += `</div>`;
            }

            html += `<div class="ai-disclaimer">⚠️ Bu analiz yapay zeka tarafından mevcut veriler kullanılarak otomatik üretilmiştir. Yatırım tavsiyesi değildir. Yatırım kararlarınızı kendi araştırmanıza ve finansal danışmanınıza dayandırınız.</div>`;
            body.innerHTML = html;
        }

                yaxis: { gridcolor: '#222', side: 'left', tickfont: {color: '#888', size: 10}, fixedrange: false, tickformat: '.4f' },
                showlegend: false, hovermode: 'closest',
                dragmode: 'pan',
                title: { text: titleHTML, x: 0.5, y: 0.97, font: {size: 13, color: '#10B981'} },

            };

            document.querySelectorAll('.shape-close-btn').forEach(b => b.remove());
            Plotly.newPlot(chartDiv, [traceP, trace50, trace200], layout, {responsive: true, displayModeBar: false, scrollZoom: false}).then(() => {
                applyUsdTimeRange(activeTimeRange, dates);

                chartDiv.on('plotly_relayout', function(eventData) {
                    if (eventData['xaxis.range[0]'] || eventData['xaxis.range'] ||
                        eventData['yaxis.range[0]'] || eventData['yaxis.range']) {
                        refreshShapeCloseBtns();
